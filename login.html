<style>
    /* ปรับแต่งหน้า Login ให้เป็นแนว Liquid Glass มีความหนา นูน และมันวาวสูง */
    #loginPage { 
        width: 100%; 
        max-width: 440px; 
        margin: 10vh auto 24px; 
        text-align: center; 
        position: relative;
    }
    
    /* ไอคอนสไตล์หยดน้ำใสหนามีมิติ */
    .auth-icon { 
        width: 86px; 
        height: 86px; 
        margin: 0 auto 22px; 
        border-radius: 24px; 
        display: grid; 
        place-items: center; 
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.05) 100%); 
        font-size: 42px; 
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-top: 2px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25), 
                    inset 0 4px 8px rgba(255, 255, 255, 0.4),
                    inset 0 -4px 10px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        filter: drop-shadow(0 2px 8px rgba(0, 242, 254, 0.3));
    }
    
    /* กล่องข้อความและฟอร์มสไตล์กระจกเหลวขอบสะท้อนแสงคมชัด */
    .login-box {
        background: rgba(10, 25, 50, 0.45);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-radius: 32px;
        padding: 30px 24px 28px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35), 
                    inset 0 1px 2px rgba(255, 255, 255, 0.4),
                    inset 0 -10px 20px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-top: 1.5px solid rgba(255, 255, 255, 0.4);
    }
    
    .login-box h2 { 
        margin-bottom: 6px; 
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .login-box h2 small {
        display: block;
        font-size: 13px;
        font-weight: 400;
        color: #00beff;
        margin-top: 6px;
        letter-spacing: 0.05em;
    }
    
    .login-box .subtitle { 
        margin-bottom: 26px; 
        font-size: 13px;
        color: #94a3b8;
        line-height: 1.5;
    }
    
    .login-box .input-group { 
        margin-bottom: 20px; 
        text-align: left;
    }
    
    .login-box .input-group label {
        display: block;
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 8px;
        font-weight: 500;
        padding-left: 4px;
    }
    
    /* ช่อง Input และ Select ทรงเจลเว้าจมลงไปในเนื้อกระจก */
    .login-box select, 
    .login-box input {
        width: 100%;
        padding: 15px 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 1.5px solid rgba(255, 255, 255, 0.2);
        background: rgba(5, 15, 30, 0.6);
        font-size: 16px;
        color: #ffffff;
        outline: none;
        box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.5);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .login-box select:focus, 
    .login-box input:focus {
        border-color: rgba(0, 132, 255, 0.5);
        background: rgba(5, 15, 30, 0.75);
        box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.6), 0 0 15px rgba(0, 132, 255, 0.3);
    }
    
    /* ปรับแต่ง Dropdown Option สำหรับบราวเซอร์ */
    .login-box select option {
        background-color: #0b1e36;
        color: #ffffff;
    }
    
    /* ปุ่มล็อกอินทรงเยลลี่หนานูนเรืองแสงเงาวับ */
    .login-box .btn { 
        width: 100%;
        padding: 16px 20px;
        border: none;
        border-radius: 18px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        color: #ffffff;
        background: linear-gradient(180deg, rgba(0, 150, 255, 0.85) 0%, rgba(0, 80, 200, 0.9) 100%); 
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-top: 2px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 12px 25px rgba(0, 80, 200, 0.4), inset 0 4px 6px rgba(255, 255, 255, 0.4);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        transition: all 0.2s ease;
    }
    
    .login-box .btn:active {
        transform: translateY(2px) scale(0.98);
        box-shadow: 0 4px 10px rgba(0, 80, 200, 0.4), inset 0 2px 4px rgba(0, 0, 0, 0.4);
    }
</style>

<div id="loginPage" class="login-box">
    <div class="auth-icon">💎</div>
    <h2 class="section-title">HUAY PRO <small>ระบบบันทึกหวย และ แจ้งเตือน</small></h2>

    <div class="input-group">
        <label for="loginUser">ผู้ใช้งานระบบ</label>
        <select id="loginUser" aria-label="เลือกผู้ใช้งาน">
            <option value="">🔄 กำลังโหลดรายชื่อผู้ใช้จากระบบ...</option>
        </select>
    </div>

    <div class="input-group">
        <label for="loginPin">รหัส PIN เข้าใช้งาน</label>
        <input type="password" id="loginPin" placeholder="••••" maxlength="4" inputmode="numeric" style="text-align: center; font-size: 24px; letter-spacing: 12px; font-weight: bold;">
    </div>

    <button class="btn" onclick="handleLogin()">🔓 เข้าสู่ระบบ</button>
</div>
